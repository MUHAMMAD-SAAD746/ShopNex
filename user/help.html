<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help & Support - E-Shop</title>
    <!-- Fav Icon Link -->
    <link rel="shortcut icon" href="../assets/images/favicon.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="user-layout">

    <!-- Header / Navbar -->
    <nav id="navigation-bar"></nav>



    <!-- Main Content -->
    <div class="container py-5">
        <div class="row g-4">
            <!-- Help Center Sidebar -->
            <div class="col-lg-3 d-none d-lg-block">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white fw-bold py-3">Help Center</div>
                    <div class="list-group list-group-flush">
                        <a href="help.html" class="list-group-item list-group-item-action active py-3"><i
                                class="bi bi-question-circle me-2"></i> Help & FAQs</a>
                        <a href="terms.html" class="list-group-item list-group-item-action py-3"><i
                                class="bi bi-file-text me-2"></i> Terms & Conditions</a>
                        <a href="privacy.html" class="list-group-item list-group-item-action py-3"><i
                                class="bi bi-shield-lock me-2"></i> Privacy Policy</a>
                        <a href="help.html" class="list-group-item list-group-item-action py-3 text-primary"><i
                                class="bi bi-envelope me-2"></i> Contact Support</a>
                    </div>
                </div>
            </div>

            <!-- Page Content -->
            <div class="col-lg-9">
                <h2 class="fw-bold mb-4">How can we help you?</h2>
                <div class="row g-4">
                    <!-- Section 1: Predefined Feedback / FAQs -->
                    <div class="col-lg-7">
                        <div class="card border-0 shadow-sm p-4 text-center bg-light h-100">
                            <div class="d-flex flex-column justify-content-center h-100 align-items-center">
                                <div class="text-muted fst-italic">
                                    <i class="bi bi-info-circle display-4 d-block mb-3"></i>
                                    <h5 class="fw-normal">Help & FAQs</h5>
                                    <p class="small">Predefined help content managed by Admin will appear here.</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Section 2: User Feeback / Contact Form -->
                    <div class="col-lg-5">
                        <div class="card border-0 shadow-sm p-4">
                            <h4 class="fw-bold mb-4">Send us Feedback</h4>
                            <p class="text-muted small mb-4">Can't find what you're looking for? Send us a message.</p>
                            <form>
                                <div class="mb-3">
                                    <label class="form-label">Your Name</label>
                                    <input type="text" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Email Address</label>
                                    <input type="email" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Message / Feedback</label>
                                    <textarea class="form-control" rows="5" required></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Submit Feedback</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white pt-5 pb-3" id="footer-container"></footer>

    <!-- Navigation Js -->
    <script src="../assets/javaScript/user js/navigation.js"></script>
    <!-- footer JS -->
    <script src="../assets/javaScript/user js/footer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
