<body class="user-layout">

    <nav id="navigation-bar"></nav>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">

            <a href="orders.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-2"></i>Back to
                Orders</a>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-light py-3">
                <div class="row align-items-center">
                    <div class="col-md-4">
                        <h5 class="mb-0">Order #<span id="order-id"></span></h5>
                    </div>
                    <div class="col-md-4 text-md-center">
                        <span class="text-muted">Placed on:</span> <span class="fw-bold" id="date">Sep 25, 2023</span>
                    </div>
                    <div class="col-md-4 text-md-end">
                        <span class="badge fs-6" id="status"></span>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 40%;">Product</th>
                                <th>Price</th>
                                <th>Quantity</th>
                                <th class="text-end">Subtotal</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td colspan="4" style="text-align: center;"><div class="loader-loading"></div></td>
                            </tr>

                                    </div>
                                </td>
                                <td>$50.00</td>

                            </tr> -->
                            <!-- <tr>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <img src="https://placehold.co/60x60?text=product" class="img-fluid rounded me-3"
                                            alt="Product Image">
                                        <div>

                                <td class="text-end fw-bold">$20.00</td>
                            </tr> -->
                        </tbody>
                        <tfoot class="border-top-0">
                            <tr>
                                <td colspan="3" class="text-end border-0 pt-4">Subtotal:</td>
                                <td class="text-end border-0 pt-4" id="Subtotal">$0.00</td>
                            </tr>
                            <tr>
                                <td colspan="3" class="text-end border-0">Shipping:</td>
                                <td class="text-end border-0" id="shipping">$0.00</td>
                            </tr>
                            <tr>
                                <td colspan="3" class="text-end border-0">Tax:</td>
                                <td class="text-end border-0" id="tax">$0.00</td>
                            </tr>
                            <tr>
                                <td colspan="3" class="text-end border-0 fw-bold fs-5">Total:</td>
                                <td class="text-end border-0 fw-bold fs-5" id="total">$0.00</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-light">
                        <h5 class="mb-0">Shipping Address</h5>
                    </div>
                    <div class="card-body">
                        <p class="mb-0">
                            <strong id="full-name">John Doe</strong><br>
                            <span id="address">123 Main St, Apt 4B</span><br>
                            <span id="city">New York</span>,
                            <span id="zip">NY 10001</span><br>
                            United States<br>
                            <i class="bi bi-telephone me-2"></i>
                            <span id="contact-number"> +1 234 567 8900</span>
                        </p>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mt-4 mt-md-0">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-light">
                        <h5 class="mb-0">Payment Method</h5>
                    </div>
                    <div class="card-body">
                        <!-- <p class="mb-0">
                            <i class="bi bi-credit-card me-2"></i> Visa ending in <strong>1234</strong><br>
                            Exp: 12/25
                        </p> -->
                        <p class="mb-0">
                            <i class="bi bi-credit-card me-2"></i><span id="payment-method"></span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
